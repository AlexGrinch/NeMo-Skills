base_output_dir: /lustre/fsw/portfolios/nemotron/users/ohrinchuk/datasets/sft
expname: fmt-trans-nano-v3-zh-code-nrt
cluster: oci-nrt-sft

fields_to_translate:
  - problem
  - generation

fields_to_consider:
  - problem
  - generation

input_file: /lustre/fsw/portfolios/nemotron/users/ohrinchuk/datasets/sft/industrious-shrimp_noncommercial.jsonl
target_langs:
  - language: German
    weight: 0.4
  - language: French
    weight: 0.3
  - language: Russian
    weight: 0.2
  - language: Japanese
    weight: 0.1
language_seed: 0
from_messages: true

pipeline_stages:
  - make_concise
  - wrap
  - escape_special_tokens
  - generate
  - unescape_special_tokens
  - filter_and_merge
  - convert_to_sft

stages:
  escape_special_tokens:
    model: /lustre/fsw/portfolios/nemotron/users/shuoyangd/models/DeepSeek-V4-Flash

  generate:
    format_config: recipes/translation/config/formatted-translation/format_nano1_escaped.yaml
    inline_args: >-
      ++inference.endpoint_type=chat
      ++inference.temperature=0.6
      ++inference.repetition_penalty=1.05
      ++inference.tokens_to_generate=40000
    stage_kwargs:
      server_type: vllm
      model: /lustre/fsw/portfolios/nemotron/users/shuoyangd/models/DeepSeek-V4-Flash
      server_gpus: 8
      server_nodes: 1
      server_args: "--tensor-parallel-size 8 --enable-expert-parallel --kv-cache-dtype fp8 --tokenizer-mode deepseek_v4"
      num_chunks: 1
      dependent_jobs: 0

  unescape_special_tokens:
    model: /lustre/fsw/portfolios/nemotron/users/shuoyangd/models/DeepSeek-V4-Flash

  filter_and_merge:
    checker: format_nano1
    on_fail: drop

  convert_to_sft:
    input_file: /lustre/fsw/portfolios/nemotron/users/ohrinchuk/datasets/sft/filter_and_merge/translated.jsonl
    model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    jobs: 1
    batch: 100
    num_shards: 1
    dependent_jobs: 0
    stage_kwargs:
      mount_paths: /lustre/fsw/portfolios/nemotron/projects/nemotron_speech_translate/users/shuoyangd:/lustre/fsw/portfolios/nemotron/projects/nemotron_speech_translate/users/shuoyangd,/lustre/fsw/portfolios/nemotron/users/ohrinchuk:/lustre/fsw/portfolios/nemotron/users/ohrinchuk
