# format 1
# input:
#    {
#      "conversations": [
#        {
#          "from": "User",
#          "value": "Print hello world with Python.",
#          "canonical_form": "",
#          "label": ""
#        },
#        {
#          "from": "Assistant",
#          "value": "<think>\nPrint hello world with Python.\n</think>\n\n```python\nprint('hello world')\n```",
#          "canonical_form": "",
#          "label": ""
#        }
#      ],
#      "system": "",
#      "mask": "User"
#    }
#
# formatting constraints:
#   - only translate the text outside <think> and </think> tags
#   - do not translate the code between ```python and ``` tags
#   - put translation as extra field "translation" in each of the conversation entries, keep all the other fields as-is

# Few-shot examples configuration
few_shot_examples:
  prefix: "Here is an example to illustrate the formatting rules:\n\n"
  template: "Input ({source_lang}):\n{input_example}\n\nOutput ({target_lang}):\n{output_example}\n\n"
  suffix: "Now translate the following:\n\n"
  examples_type: "format1_translation_few_shot"
  # this reuses the test data from test_data.py to avoid redundancy
  # and available as {examples} key in the final prompt

system: You are an experienced translator that translates documents accurately into fluent text in target language, while following other formatting instructions in the prompt.

user: |-
  You need to translate some {source_lang} source text to {target_lang}.

  Please follow these formatting rules:

  (1) For text between <think> and </think> tags: keep the original text, do not translate
  (2) For code blocks between ``` tags: keep the original code, do not translate
  (3) For all other text in "value" fields: translate it to {target_lang}
  (4) Return the translation as a json object, with an extra field "translation" in each conversation entry. Keep all input fields unchanged.

  {examples}{source_lang}: {src}
