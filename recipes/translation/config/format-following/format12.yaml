# format 12
# {
#   "problem": "Which of the following best describes the concept of the digital divide and its impact on global inequality in the 21st century?\nA: The digital divide refers to the gap between those who have ready access to computers and the internet and those who do not, often exacerbating social and economic inequalities.\nB: The digital divide is the difference in technological skills between younger and older generations, leading to a generational gap in employment opportunities.",
#   "generation": "<think>\nI need to solve this problem about the digital divide and its impact on global inequality. The question asks which option best describes the concept and its impact.\n\nOption A says: \"The digital divide refers to the gap between those who have ready access to computers and the internet and those who do not, often exacerbating social and economic inequalities.\"\n\nThis sounds right. It mentions access to computers and the internet, and it talks about exacerbating social and economic inequalities.\n\nI think A is the answer.\n</think>\nA\n\n\\boxed{\\text{A}}",
#   "expected_answer": "\\text{A}",
#   "majority_res": "8/8",
#   "topic": "history",
#   "subtopic": "neo_colonialism",
#   "difficulty": "complex"
# }
#
# formatting constraints:
#   - translate the problem field to {target_lang}
#   - for the generation field, extract content inside <think> tags and content outside separately
#   - translate both the reasoning (inside think tags) and answer (outside think tags) to {target_lang}
#   - store them in a nested object with "reasoning_translation" and "answer_translation" keys
#   - translate the expected_answer field to {target_lang}
#   - add a new field called "problem_metadata" that contains a descriptive sentence in {target_lang}
#   - the problem_metadata should describe the problem using the difficulty, topic, and subtopic fields
#   - write the problem_metadata directly in {target_lang} (do not write in English first)
#   - preserve all new-lines and whitespaces
#   - preserve all latex-like formatting, for example \boxed{} and \text{}
#   - return the translation as a json object
#   - keep all the other fields as-is

# Few-shot examples configuration
few_shot_examples:
  prefix: "Here is an example to illustrate the formatting rules:\n\n"
  template: "Input ({source_lang}):\n{input_example}\n\nOutput ({target_lang}):\n{output_example}\n\n"
  suffix: "Now translate the following:\n\n"
  examples_type: "format12_translation_few_shot"
  # this reuses the test data from test_data.py to avoid redundancy
  # and available as {examples} key in the final prompt

system: You are an experienced translator that translates documents accurately into fluent text in target language, while following other formatting instructions in the prompt.

user: |-
  You need to translate the {source_lang} source text to {target_lang}.

  Please follow these formatting rules:

  (1) For the problem field: translate it to {target_lang}
  (2) For the generation field: extract content inside <think> tags and content outside separately, then translate both parts
  (3) Store the translated reasoning (inside think tags) in "reasoning_translation" key
  (4) Store the translated answer (outside think tags) in "answer_translation" key
  (5) For the expected_answer field: translate it to {target_lang}
  (6) Add a new field called "problem_metadata" that describes the problem using the difficulty, topic, and subtopic fields
  (7) Write the problem_metadata directly in {target_lang} (do not write in English first)
  (8) Preserve all new-lines and whitespaces
  (9) Preserve all latex-like formatting, for example \boxed{{}} and \text{{}}
  (10) Return the translation as a json object
  (11) Keep all the other fields as-is

  {examples}Here is the source json object:

  {src}
