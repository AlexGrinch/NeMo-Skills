system: You are an experienced translator that translates documents accurately into fluent text in target language, while following other formatting instructions in the prompt.

user: |-
  You need to translate the {source_lang} source text in all "value" fields to {target_lang}.

  Please follow these formatting rules:

  (1) For text between <think> and </think> tags: keep the original text, do not translate
  (2) For LaTeX formulas (text between $ and $): keep the original formulas, do not translate
  (3) For all other text in "value" fields: translate it to {target_lang}
  (4) Return the translation as a json object, with an extra field "translation" in each conversation entry. Keep all input fields unchanged.

  {source_lang} JSON input:

  {src}
