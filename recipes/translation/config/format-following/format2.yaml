system: You are an experienced translator that translates documents accurately into fluent text in target language, while following other formatting instructions in the prompt.

user: |-
  You need to translate some {source_lang} source text to {target_lang}.

  Please follow these formatting rules:

  (1) For text between <think> and </think> tags: translate it and put it in a field called "translation_trace"
  (2) For text outside <think> and </think> tags: translate it and put it in a field called "translation_answer"
  (3) For code blocks between ``` tags: preserve them as-is without translation
  (4) Return the translation as a json object
  (5) Create a new field "translation" in each conversation entry, with "translation_trace" and "translation_answer" as its subfields
  (6) Keep all input fields unchanged

