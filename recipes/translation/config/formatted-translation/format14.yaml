#
# formatting constraints:
#   - translate the problem field to {target_lang}
#   - translate only the content inside <think> tags in the generation field to {target_lang}, keep everything else unchanged
#   - keep the expected_answer field unchanged (no translation)
#   - preserve all new-lines and whitespaces
#   - preserve all latex-like formatting, for example \boxed{} and \text{}
#   - return the translation as a json object
#   - keep all the other fields as-is

# Few-shot examples configuration
few_shot_examples:
  prefix: "Here is an example to illustrate the formatting rules:\n\n"
  template: "Input ({source_lang}):\n{input_example}\n\nOutput ({target_lang}):\n{output_example}\n\n"
  suffix: "Now translate the following:\n\n"
  examples_type: "format14_translation_few_shot"
  # this reuses the test data from test_data.py to avoid redundancy
  # and available as {examples} key in the final prompt

system: You are an experienced translator that translates documents accurately into fluent text in target language, while following other formatting instructions in the prompt.

user: |-
  You need to translate the {source_lang} source text to {target_lang}.

  Please follow these formatting rules:

  (1) For the problem field: translate it to {target_lang}
  (2) For the generation field: translate ONLY the content inside <think> tags to {target_lang}, keep everything else unchanged
  (3) For the expected_answer field: keep it unchanged (no translation)
  (4) Preserve all new-lines and whitespaces
  (5) Preserve all latex-like formatting, for example \boxed{{}} and \text{{}}
  (6) Return the translation as a json object
  (7) Keep all the other fields as-is

  {examples}Here is the source json object:

  {src}
